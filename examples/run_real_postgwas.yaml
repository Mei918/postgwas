study:
  name: ad_ebv_real

reference:
  genome_build: GRCh38

inputs:
  eqtl:
    path: /home/y413109/project/eqtl/standardized/brain_eqtl_standardized.tsv.gz
    sep: "\t"
    compression: gzip
    columns:
      chrom: chrom
      position: position
      effect_allele: effect_allele
      other_allele: other_allele
      beta: beta
      se: se
      p_value: p_value
      maf: maf
      gene_id: gene_id
      cell_type: cell_type
  gwas:
    path: /home/y413109/project/eqtl/standardized/ad_gwas_standardized.tsv.gz
    sep: "\t"
    compression: gzip
    columns:
      chrom: chrom
      position: position
      effect_allele: effect_allele
      other_allele: other_allele
      beta: beta
      se: se
      p_value: p_value
      maf: maf
  output_dir: /home/y413109/project/eqtl/postgwas_runs/ad_ebv_real

runtime:
  rscript_executable: Rscript

batch:
  mode: gene_cell_type
  write_group_harmonized: false
  chunk_size: 200000
  progress_every: 10

postgwas:
  eqtl_trait_type: quant
  gwas_trait_type: cc
  eqtl_sd_y: 1.0
  eqtl_sample_size: 192
  gwas_sample_size: 788989
  gwas_case_prop: 0.5
  coloc:
    min_overlap_snps: 20
    pp4_threshold: 0.8
    p1: 1.0e-4
    p2: 1.0e-4
    p12: 1.0e-5
  mr:
    method: wald_ratio
